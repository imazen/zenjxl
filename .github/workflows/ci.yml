name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true

jobs:
  # Base tests (no-default-features, zencodec) — run on all platforms.
  test-base:
    name: Base (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-26-intel, windows-latest, windows-11-arm]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Patch path deps for CI
        shell: bash
        run: |
          perl -i -pe 's/, path = "[^"]*"//g' Cargo.toml
      - name: Check (no default features)
        run: cargo check --no-default-features
      - name: Test (no default features)
        run: cargo test --no-default-features
      - name: Check (zencodec only)
        run: cargo check --no-default-features --features zencodec
      - name: Test (zencodec only)
        run: cargo test --no-default-features --features zencodec

  # Feature permutation tests — skipped on aarch64 due to upstream
  # zenjxl-decoder repr(transparent) issue.
  test-features:
    name: Features (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Clone zenjxl-decoder (test resources)
        shell: bash
        run: git clone --depth 1 https://github.com/imazen/zenjxl-decoder ../zenjxl-decoder
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: features
      - name: Patch path deps for CI
        shell: bash
        run: |
          perl -i -pe 's/, path = "[^"]*"//g' Cargo.toml
      - name: Check (decode only)
        run: cargo check --no-default-features --features decode
      - name: Test (decode only)
        run: cargo test --no-default-features --features decode
      - name: Check (encode only)
        run: cargo check --no-default-features --features encode
      - name: Test (encode only)
        run: cargo test --no-default-features --features encode
      - name: Test (all features)
        run: cargo test --all-features

  i686:
    name: Test (i686 cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-i686
      - name: Patch path deps for CI
        shell: bash
        run: |
          perl -i -pe 's/, path = "[^"]*"//g' Cargo.toml
      - name: Test (i686, no default features)
        run: cross test --target i686-unknown-linux-gnu --no-default-features

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - name: Patch path deps for CI
        shell: bash
        run: |
          perl -i -pe 's/, path = "[^"]*"//g' Cargo.toml
      - name: Check WASM (no default features)
        run: cargo check --target wasm32-wasip1 --no-default-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Patch path deps for CI
        shell: bash
        run: |
          perl -i -pe 's/, path = "[^"]*"//g' Cargo.toml
      - name: Clippy (no default features)
        run: cargo clippy --no-default-features --all-targets -- -D warnings
      - name: Clippy (zencodec only)
        run: cargo clippy --no-default-features --features zencodec --all-targets -- -D warnings
      - name: Clippy (decode only)
        run: cargo clippy --no-default-features --features decode --all-targets -- -D warnings
      - name: Clippy (encode only)
        run: cargo clippy --no-default-features --features encode --all-targets -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --all-features --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format check
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
      - name: Patch path deps for CI
        shell: bash
        run: |
          perl -i -pe 's/, path = "[^"]*"//g' Cargo.toml
      - name: Check MSRV (no default features)
        run: cargo hack check --rust-version --no-default-features
      - name: Check MSRV (all features)
        run: cargo hack check --rust-version --all-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Clone zenjxl-decoder (test resources)
        run: git clone --depth 1 https://github.com/imazen/zenjxl-decoder ../zenjxl-decoder
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Patch path deps for CI
        shell: bash
        run: |
          perl -i -pe 's/, path = "[^"]*"//g' Cargo.toml
      - name: Generate coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
