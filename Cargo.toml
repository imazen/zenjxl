[package]
name = "zenjxl"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "AGPL-3.0-only"
description = "JPEG XL encoding and decoding with zencodec trait integration"
categories = ["multimedia::images", "multimedia::encoding"]
keywords = ["jxl", "jpeg-xl", "image", "encoder", "decoder"]
repository = "https://github.com/imazen/zenjxl"
exclude = ["CLAUDE.md", ".claude/", ".github/"]

[dependencies]
thiserror = { version = "2.0.18", default-features = false }
whereat = "0.1.4"
rgb = { version = "0.8.53", default-features = false, features = ["as-bytes"] }
imgref = "1.12.0"
bytemuck = { version = "1.25.0", default-features = false }
enough = "0.4.2"
zencodec = { version = "0.1.1" }
zenpixels = { version = "0.2.0", default-features = false, features = ["rgb"] }
linear-srgb = "0.6.4"
jxl = { path = "../zenjxl-decoder/jxl", package = "zenjxl-decoder", optional = true }
jxl-encoder = { path = "../jxl-encoder-rs/jxl_encoder", optional = true, default-features = false, features = ["std"] }

[dev-dependencies]
archmage = { version = "0.9.12", features = ["std"] }

[features]
default = ["encode", "decode"]
decode = ["dep:jxl"]
encode = ["dep:jxl-encoder"]
butteraugli-loop = ["encode", "jxl-encoder/butteraugli-loop"]
# Enable zencodec trait integration
zencodec = []
