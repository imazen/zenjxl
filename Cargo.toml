[package]
name = "zenjxl"
version = "0.1.0"
edition = "2024"
rust-version = "1.89"
license = "BSD-3-Clause"
description = "JPEG XL encoding and decoding with zencodec-types trait integration"
categories = ["multimedia::images", "multimedia::encoding"]
keywords = ["jxl", "jpeg-xl", "image", "encoder", "decoder"]
repository = "https://github.com/imazen/zenjxl"

[dependencies]
thiserror = { version = "2.0", default-features = false }
rgb = { version = "0.8", default-features = false, features = ["as-bytes"] }
imgref = "1.12"
bytemuck = { version = "1.25", default-features = false }
enough = "0.4"
zencodec-types = { path = "../zencodec-types" }
zenpixels = { path = "../zenpixels/zenpixels", default-features = false, features = ["buffer"] }
linear-srgb = "0.5.5"
jxl = { path = "../zenjxl-decoder/jxl", package = "zenjxl-decoder", optional = true }
jxl-encoder = { path = "../jxl-encoder-rs/jxl_encoder", optional = true, default-features = false, features = ["std"] }

[dev-dependencies]
archmage = { version = "0.8.6", features = ["std"] }

[features]
default = ["encode", "decode"]
decode = ["dep:jxl"]
encode = ["dep:jxl-encoder"]
butteraugli-loop = ["encode", "jxl-encoder/butteraugli-loop"]
# Enable zencodec-types trait integration (broken pending trait update)
zencodec = []
