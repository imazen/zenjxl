[package]
name = "zenjxl"
version = "0.3.0"
edition = "2024"
rust-version = "1.93"
license = "AGPL-3.0-only OR LicenseRef-Imazen-Commercial"
description = "JPEG XL encoding and decoding with zencodec trait integration"
categories = ["multimedia::images", "multimedia::encoding"]
keywords = ["jxl", "jpeg-xl", "image", "encoder", "decoder"]
repository = "https://github.com/imazen/zenjxl"
# README.crates.md is the badge-free crates.io README, generated from README.md
# by zenutils gen-readme-crates.sh (see the per-crate README conventions).
readme = "README.crates.md"
include = [
    "/src/**",
    "/README.crates.md",
    "/CHANGELOG.md",
    "/LICENSE*",
]

[dependencies]
thiserror = { version = "2.0.18", default-features = false }
whereat = { version = "0.1.5"}
rgb = { version = "0.8.53", default-features = false, features = ["as-bytes"] }
imgref = "1.12.0"
enough = "0.4.3"
# RELEASE GATE: 0.3.0 consumes the CategorizedError taxonomy (zencodec#103,
# reshaped into a two-level origin-first taxonomy by #116), which is
# unreleased — it lives on the `caterr-reshape` branch (still versioned
# 0.1.25) via the [patch.crates-io] pin below. The published zencodec 0.1.25
# does NOT have it, so this requirement MUST be bumped to "0.1.26" (and the
# patch dropped) before zenjxl 0.3.0 can be published. Declaring "0.1.26"
# today would break resolution: the patch's 0.1.25 would no longer match the
# requirement and crates.io has nothing >= 0.1.26 yet.
zencodec = { version = "0.1.25" }
zenpixels = { version = "0.2.11", default-features = false, features = ["rgb"] }
# Pixel-exact orientation baking (`orient::apply_orientation`) for the zencodec
# decode adapter's OrientationHint handling. Only the `orient` module is used
# (no CMS / ICC db); `rgb` matches the zenpixels feature already enabled above.
# Pulled in by the `zencodec` feature (the adapter is gated there), like zenwebp.
zenpixels-convert = { version = "0.2.13", default-features = false, features = ["rgb"], optional = true }
linear-srgb = { version = "0.6.7"}
jxl = { version = "0.3.10", package = "zenjxl-decoder", optional = true }
jxl-encoder = { version = "0.3.2", optional = true, default-features = false, features = ["std", "convenience"] }
# Source-quality detection (header-only) for the inferred-target floor predictor
# (jpeg-lossy feature). detect is ungated in zenjpeg; default-features = false
# keeps it light (no decoder pulled). 0.9.0 tracks the sibling's defensive
# Pattern-B pre-bump (zenjpeg b03e7253) — the [patch.crates-io] path entry
# below stopped matching the old ^0.8.7 req the moment the sibling bumped,
# breaking every zenjxl dev build that resolves dev-deps (examples/tests).
zenjpeg = { version = "0.9.0", optional = true, default-features = false }
# Gain-map application for GainMapRender::ReconstructHdr (reconstruct-hdr
# feature). Pure gain-map math; jhgm ISO 21496-1 parameter parsing comes
# from zencodec, so the registry release suffices.
ultrahdr-core = { version = "0.5.0", optional = true, default-features = false, features = ["std"] }
# zennode = { path = "../zennode/zennode", optional = true, default-features = false, features = ["derive"] }

# jxl-encoder 0.3.2 (lossy-JPEG recompression API) + zenjpeg 0.8.7 (libjxl-parity
# magetypes fix) are not yet on crates.io; path-patch to the local siblings, the
# same pattern jxl-encoder itself uses for its unpublished zenjpeg dep. Remove
# these once the chain is published (see docs/zenjxl_jpeg_lossy/README.md in the
# jxl-encoder repo). Builds require the sibling checkouts.
# (zenjxl-decoder 0.3.10 — with the mode-aware orientation API the adapter
# consumes — is now published, so its path-patch was dropped and the `jxl`
# dep above bumped to 0.3.10.)
[patch.crates-io]
# TEMP: until zencodec 0.1.26 ships (PR #116 — two-level origin-first
# ErrorCategory reshape, branch `caterr-reshape`). Remove this patch and bump
# the `zencodec` dep to the released version once zencodec 0.1.26 is published.
# Pinned to rev 2427387f on the (unmerged, CI-green) `caterr-reshape` branch,
# one commit ahead of the prior pin (c3220d51) — that commit reshapes the flat
# 17-variant CategorizedError taxonomy (PR #103/#112) into the two-level
# Image/Request/Resource/Policy/Lifecycle/Io/Internal origin-first shape.
# `ErrorCategory` was never published, so this is not a break of released API.
# The `zencodec-testkit` dev-dep below is pinned to the SAME rev so the patched
# `zencodec` and the testkit resolve to one unified zencodec.
zencodec = { git = "https://github.com/imazen/zencodec", rev = "44ca79279b265ba7dfe01a2b31ef74788429509a" }
jxl-encoder = { path = "../jxl-encoder/jxl-encoder" }
zenjpeg = { path = "../zenjpeg/zenjpeg" }
# The `JxlDecoderOptions::reject_progressive` decode-time gate is on
# zenjxl-decoder main but unreleased (0.3.10 predates it). Path-patch the
# sibling so the policy→reject_progressive wiring resolves; bump the `jxl`
# dep to 0.3.11 + drop this patch when zenjxl-decoder publishes.
zenjxl-decoder = { path = "../zenjxl-decoder/zenjxl-decoder" }
# jxl-encoder main needs butteraugli 0.9.4 (`ButteraugliReference::
# estimated_reference_bytes`, the alloc-budget precompute API), which is not
# on crates.io yet (latest published: 0.9.3). jxl-encoder's own workspace
# patches butteraugli to the local path, but a dependency's [patch] table is
# ignored when jxl-encoder is consumed here — so zenjxl must carry the same
# patch. Drop this once butteraugli 0.9.4 publishes. Note the extra `../`:
# the butteraugli repo lives beside `~/work/zen`, not inside it.
butteraugli = { path = "../../butteraugli/butteraugli" }

[dev-dependencies]
# Conformance harness (unpublished companion crate) for the EOF/truncation-series
# decode check (tests/truncation_series.rs). Pinned to the SAME git rev as the
# `zencodec` [patch.crates-io] above so both resolve to one unified zencodec.
# Drop for a crates.io version dep once zencodec 0.1.26 + testkit publish.
zencodec-testkit = { git = "https://github.com/imazen/zencodec", rev = "44ca79279b265ba7dfe01a2b31ef74788429509a" }
# Concrete `enough::Stop` token for the README cancellation example
# (tests/readme_examples.rs compiles the documented snippets).
almost-enough = "0.4.4"
archmage = { version = "0.9.19", features = ["std"] }
# Builds the jhgm gain-map fixture for tests/gain_map_render.rs
# (GainMapBundle + append_gain_map_bundle).
jxl-encoder = { version = "0.3.2", default-features = false, features = [
    "std",
    "convenience",
    "hdr-gainmap",
] }
# Synthesizes a real Display-P3 ICC for the jpeg-lossy color-preservation test
# (`tests/jpeg_lossy.rs`). Matches the moxcms the jpeg-lossy feature already
# pulls via zenjpeg, so no extra version in the graph.
moxcms = { version = ">=0.8.1, <0.10" }
# SSIMULACRA2 scoring for the sweep-validation harness
# (examples/sweep_validate.rs).
fast-ssim2 = "0.8.2"
# Corpus loading (CID22-512) + synthetic generators for the same harness.
# Path-only dev-dep (publish = false upstream): stripped on `cargo publish`,
# so it only binds local builds — which already require the sibling checkouts
# via [patch.crates-io].
zenjpeg-bench-utils = { path = "../zenjpeg/zenjpeg-bench-utils", default-features = false }

[features]
default = ["encode", "decode"]
decode = ["dep:jxl"]
threads = ["decode", "jxl/threads"]
encode = ["dep:jxl-encoder"]
# Enable rayon-based per-frame parallelism inside the JXL encoder.
# Useful when a single encode call should saturate multiple cores
# (e.g. high-effort encodes); not needed when the caller already runs
# many encode tasks in parallel.
parallel = ["encode", "jxl-encoder/parallel"]
butteraugli-loop = ["encode", "jxl-encoder/butteraugli-loop"]
# Lossy JPEG -> JXL recompression to a quality target (PreserveJxl closed loop).
# Needs both encode (jxl-encoder's coefficient-domain coarsener, behind its
# `jpeg-reencoding` feature) AND decode (to score each candidate in-process).
# Metric-agnostic: the caller supplies a scorer callback over decoded RGB8.
# zenjpeg/decoder provides the source-ICC extractor (`extract_icc_profile`, a pure
# APP2 byte-scanner) so the Reencode path preserves a wide-gamut source's color
# profile instead of silently relabeling it sRGB. (No `zenjpeg/moxcms` needed — the
# extractor does no color management; its re-export was ungated in zenjpeg.)
jpeg-lossy = ["encode", "decode", "jxl-encoder/jpeg-reencoding", "dep:zenjpeg", "zenjpeg/decoder"]
# Expert / unstable: forwards jxl-encoder's `__expert` feature so picker
# training and codec calibration sweeps can apply
# `LossyConfig::with_internal_params(LossyInternalParams)` /
# `LosslessConfig::with_internal_params(LosslessInternalParams)` through
# zenjxl's re-exports. Double-underscore prefix signals "private — do
# not depend on this in production code." Anything in the underlying
# escape hatch may change without semver bumps.
__expert = ["encode", "jxl-encoder/__expert"]
# Enable zencodec trait integration. Pulls zenpixels-convert for the decode
# adapter's OrientationHint baking (`orient::apply_orientation`); zencodec
# itself is a non-optional dep, so this flag only toggles the trait-impl code.
zencodec = ["dep:zenpixels-convert"]
# Native HDR reconstruction for `GainMapRender::ReconstructHdr` (zencodec
# adapter): SDR-base jhgm bundles get the gain map applied via ultrahdr-core
# (linear f32/f16 output + CLL/MDCV envelope); HDR-base bundles return the
# base, which already carries its own HDR signaling. Flips
# `DecodeCapabilities::reconstructs_hdr()` to true. Without this feature,
# ReconstructHdr downgrades to surfacing Components per the zencodec contract.
reconstruct-hdr = ["zencodec", "decode", "dep:ultrahdr-core"]
# Enable zennode node definitions (EncodeJxl, DecodeJxl)
# zennode = ["dep:zennode"]

# Empirical validation of the curated sweep axes + fingerprint contract
# (see docs/VARIANT_GENERATION.md). Run:
#   GIT_COMMIT=$(git rev-parse --short HEAD) cargo run --release \
#     --example sweep_validate --features __expert -- \
#     --out benchmarks/sweep_validate_$(date +%F).tsv
[[example]]
name = "sweep_validate"
required-features = ["encode", "decode", "__expert"]
